<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Abdirahman Mohamed — ERPNext Consultant</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Mono&family=Instrument+Sans&display=swap" rel="stylesheet">

<style>
:root {
  --bg:#0e0e0d;
  --text:#f0ede6;
  --muted:#888780;
  --accent:#C8B97A;
  --teal:#5DCAA5;
  --border:rgba(255,255,255,0.07);
  --border-strong:rgba(255,255,255,0.13);
  --mono:'DM Mono', monospace;
  --serif:'DM Serif Display', serif;
}

body {
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:'Instrument Sans', sans-serif;
}

/* HERO */
.hero {
  display:flex;
  justify-content:space-between;
  padding:120px 40px;
  gap:60px;
}

h1 {
  font-family:var(--serif);
  font-size:72px;
  line-height:1;
}

em { color:var(--accent); }

/* TERMINAL */
.terminal-wrapper {
  flex:1;
  max-width:480px;
  height:320px;
  background:#050505;
  border:1px solid var(--border-strong);
  border-radius:4px;
  display:flex;
  flex-direction:column;
  font-family:var(--mono);
}

.terminal-header {
  background:#1a1a19;
  padding:10px;
  border-bottom:1px solid var(--border);
}

.terminal-body {
  padding:15px;
  flex:1;
  overflow-y:auto;
  font-size:13px;
}

.terminal-line { margin-bottom:6px; }
.terminal-prompt { color:var(--teal); }

#terminal-input {
  background:transparent;
  border:none;
  outline:none;
  color:var(--accent);
  width:100%;
  font-family:var(--mono);
}
</style>
</head>

<body>

<section class="hero">
  <div>
    <h1>ERP systems that<br>actually <em>work</em><br>for your business.</h1>
  </div>

  <div class="terminal-wrapper">
    <div class="terminal-header">darwesh@ubuntu:~</div>

    <div class="terminal-body" id="terminal-out">
      <div class="input-area">
        <span class="terminal-prompt">darwesh@ubuntu:~$</span>
        <input id="terminal-input" autofocus>
      </div>
    </div>
  </div>
</section>

<script>
const input = document.getElementById('terminal-input');
const output = document.getElementById('terminal-out');
const inputArea = input.parentElement;

let history = [];
let historyIndex = -1;
let currentPath = "~";

const fs = {
  "~": {
    children: {
      about:{content:"ERPNext consultant focused on business systems + cloud."},
      skills:{content:"ERPNext | AWS | Linux | Networking"},
      experience:{content:"Azzir Group\nSuza Logistics\nShell"},
      contact:{content:"email: abdirahmandarwesh1@gmail.com"},
      projects:{type:"dir"}
    }
  }
};

function print(text,speed=0){
  const line=document.createElement("div");
  line.className="terminal-line";
  output.insertBefore(line,inputArea);

  if(speed===0){ line.textContent=text; }
  else{
    let i=0;
    const int=setInterval(()=>{
      line.textContent+=text[i];
      i++;
      if(i>=text.length) clearInterval(int);
    },speed);
  }

  output.scrollTop=output.scrollHeight;
}

function runCommand(cmd){
  const [base,...args]=cmd.split(" ");

  switch(base){
    case "help":
      return "ls cd cat clear whoami pwd";

    case "ls":
      return Object.keys(fs["~"].children).join(" ");

    case "cat":
      return fs["~"].children[args[0]]?.content || "not found";

    case "whoami":
      return "abdirahman@darwesh.tech";

    case "pwd":
      return currentPath;

    case "clear":
      output.innerHTML="";
      output.appendChild(inputArea);
      return "";

    default:
      return "command not found";
  }
}

input.addEventListener("keydown",(e)=>{
  if(e.key==="Enter"){
    const cmd=input.value;

    print(`darwesh@ubuntu:~$ ${cmd}`);
    const res=runCommand(cmd);

    if(res) print(res,5);

    history.push(cmd);
    historyIndex=history.length;

    input.value="";
  }
});

function boot(){
  print("Booting Darwesh OS...",10);
  setTimeout(()=>print("System ready. Type help\n",10),400);
}

boot();
</script>

</body>
</html>
