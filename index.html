<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Abdirahman Mohamed — ERPNext Consultant</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">

<style>
/* KEEP ALL YOUR ORIGINAL CSS */
*{box-sizing:border-box;margin:0;padding:0;}

:root{
  --bg:#0e0e0d;
  --surface:#161614;
  --border:rgba(255,255,255,0.07);
  --border-strong:rgba(255,255,255,0.13);
  --text:#f0ede6;
  --muted:#888780;
  --accent:#C8B97A;
  --teal:#5DCAA5;
  --mono:'DM Mono', monospace;
  --serif:'DM Serif Display', serif;
  --sans:'Instrument Sans', sans-serif;
}

body{
  background:var(--bg);
  color:var(--text);
  font-family:var(--sans);
}

/* HERO FIX (side-by-side layout) */
.hero{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:60px;
  padding:120px 40px 80px;
}

/* TERMINAL */
.terminal-wrapper{
  width:420px;
  height:300px;
  background:#050505;
  border:1px solid var(--border-strong);
  border-radius:6px;
  display:flex;
  flex-direction:column;
  font-family:var(--mono);
  box-shadow:0 30px 60px rgba(0,0,0,0.5);
}

.terminal-header{
  background:#1a1a19;
  padding:10px;
  border-bottom:1px solid var(--border);
  font-size:12px;
  color:var(--muted);
}

.terminal-body{
  padding:12px;
  font-size:13px;
  overflow-y:auto;
  flex:1;
}

.terminal-line{margin-bottom:6px;}
.terminal-prompt{color:var(--teal);margin-right:6px;}

#terminal-input{
  background:transparent;
  border:none;
  outline:none;
  color:#00ff88;
  width:100%;
  font-family:var(--mono);
}
/* TERMINAL (non-breaking) */
.terminal-wrapper{
  position:absolute;
  right:40px;
  top:120px;
  width:380px;
  height:260px;
  background:#050505;
  border:1px solid var(--border-strong);
  border-radius:6px;
  display:flex;
  flex-direction:column;
  font-family:var(--mono);
  box-shadow:0 20px 50px rgba(0,0,0,0.6);
}

.terminal-header{
  background:#1a1a19;
  padding:8px 12px;
  font-size:11px;
  color:var(--muted);
  border-bottom:1px solid var(--border);
}

.terminal-body{
  padding:10px;
  font-size:12px;
  overflow-y:auto;
  flex:1;
}

.terminal-line{margin-bottom:5px;}
.terminal-prompt{color:var(--teal);}

#terminal-input{
  background:transparent;
  border:none;
  outline:none;
  color:#00ff88;
  font-family:var(--mono);
  width:100%;
}
</style>
</head>

<body>

<nav>
  <a href="#" class="nav-logo">darwesh.tech</a>
</nav>

<section class="hero">

  <div>
    <h1>ERP systems that<br>actually <em>work</em> for<br>your business.</h1>
  </div>

  <!-- TERMINAL -->
  <div class="terminal-wrapper">
    <div class="terminal-header">darwesh@ubuntu: ~</div>

    <div class="terminal-body" id="terminal-out">
      <div class="terminal-line">Booting Darwesh OS...</div>
      <div class="terminal-line">System ready. Type help</div>

      <div class="input-area">
        <span class="terminal-prompt">darwesh@ubuntu:~$</span>
        <input id="terminal-input" autofocus autocomplete="off">
      </div>
    </div>
  </div>

</section>

<!-- KEEP ALL YOUR OTHER SECTIONS EXACTLY AS THEY ARE -->
<!-- (about, skills, experience, contact, footer) -->

<script>
const input=document.getElementById("terminal-input");
const output=document.getElementById("terminal-out");
const inputArea=input.parentElement;

let history=[];
let historyIndex=-1;
let currentPath="~";

const fs={
  "~":{
    children:{
      about:{content:"ERPNext consultant focused on business workflows + cloud systems."},
      skills:{content:"ERPNext | AWS | Linux | Networking"},
      experience:{content:"Azzir Group\nSuza Logistics\nShell"},
      contact:{content:"email: abdirahmandarwesh1@gmail.com"},
      projects:{type:"dir"}
    }
  }
};

function print(text){
  const line=document.createElement("div");
  line.className="terminal-line";
  line.textContent=text;
  output.insertBefore(line,inputArea);
  output.scrollTop=output.scrollHeight;
}

function runCommand(cmd){
  const [base,...args]=cmd.split(" ");

  switch(base){
    case "help":
      return "ls cd cat clear whoami pwd";

    case "ls":
      return Object.keys(fs["~"].children).join(" ");

    case "cat":
      return fs["~"].children[args[0]]?.content||"not found";

    case "whoami":
      return "abdirahman@darwesh.tech";

    case "pwd":
      return currentPath;

    case "clear":
      output.innerHTML="";
      output.appendChild(inputArea);
      return "";

    default:
      return "command not found";
  }
}

input.addEventListener("keydown",(e)=>{
  if(e.key==="Enter"){
    const cmd=input.value.trim();

    print(`darwesh@ubuntu:~$ ${cmd}`);
    const res=runCommand(cmd);

    if(res) print(res);

    history.push(cmd);
    historyIndex=history.length;

    input.value="";
  }

  if(e.key==="ArrowUp"){
    historyIndex=Math.max(0,historyIndex-1);
    input.value=history[historyIndex]||"";
  }

  if(e.key==="ArrowDown"){
    historyIndex=Math.min(history.length,historyIndex+1);
    input.value=history[historyIndex]||"";
  }
});

document.querySelector(".terminal-body").addEventListener("click",()=>input.focus());
</script>
<script>
const input=document.getElementById("terminal-input");
const output=document.getElementById("terminal-out");
const inputArea=input.parentElement;

let history=[];
let historyIndex=-1;

const fs={
  about:"ERPNext consultant focused on business systems.",
  skills:"ERPNext | AWS | Linux",
  contact:"email: abdirahmandarwesh1@gmail.com"
};

function print(text){
  const line=document.createElement("div");
  line.className="terminal-line";
  line.textContent=text;
  output.insertBefore(line,inputArea);
  output.scrollTop=output.scrollHeight;
}

function run(cmd){
  const [base,arg]=cmd.split(" ");

  switch(base){
    case "help": return "ls cat whoami clear";
    case "ls": return Object.keys(fs).join(" ");
    case "cat": return fs[arg]||"not found";
    case "whoami": return "abdirahman@darwesh.tech";
    case "clear":
      output.innerHTML="";
      output.appendChild(inputArea);
      return "";
    default: return "command not found";
  }
}

input.addEventListener("keydown",(e)=>{
  if(e.key==="Enter"){
    const cmd=input.value.trim();

    print(`darwesh@ubuntu:~$ ${cmd}`);
    const res=run(cmd);

    if(res) print(res);

    history.push(cmd);
    historyIndex=history.length;
    input.value="";
  }
});

document.querySelector(".terminal-body").onclick=()=>input.focus();
</script>
</body>
</html>
